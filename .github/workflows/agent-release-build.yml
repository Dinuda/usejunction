name: Agent release candidate

on:
  push:
    tags:
      - "agent-v*"

permissions:
  contents: write

jobs:
  windows-test:
    name: Windows agent tests and ARM64 build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum
      - name: Test Windows agent
        working-directory: agent
        run: go test ./...
      - name: Parse PowerShell installer
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path ./install.ps1),
            [ref]$tokens,
            [ref]$errors
          )
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
      - name: Cross-build Windows ARM64
        working-directory: agent
        run: go build -o "$env:RUNNER_TEMP/usejunction-windows-arm64.exe" .
        env:
          CGO_ENABLED: "0"
          GOOS: windows
          GOARCH: arm64

  build:
    runs-on: macos-14
    needs: windows-test
    # Signing keys live on the agent-production environment (not repo secrets).
    environment: agent-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum
      - name: Resolve immutable version
        id: version
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#agent-v}"
          [[ "$version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; tags and artifacts are immutable." >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Test agent
        working-directory: agent
        run: go test ./...
      - name: Build release artifacts
        run: ./scripts/build-agent-releases.sh "${{ steps.version.outputs.value }}" normal
        env:
          AGENT_UPDATE_TRUSTED_KEYS: ${{ secrets.AGENT_UPDATE_TRUSTED_KEYS }}
          AGENT_UPDATE_SIGNING_KEY_ID: ${{ secrets.AGENT_UPDATE_SIGNING_KEY_ID }}
          AGENT_UPDATE_SIGNING_PRIVATE_KEY: ${{ secrets.AGENT_UPDATE_SIGNING_PRIVATE_KEY }}
      - name: Create draft candidate
        shell: bash
        run: |
          out="apps/admin/public/releases/download/v${{ steps.version.outputs.value }}"
          gh release create "$GITHUB_REF_NAME" "$out"/* \
            --draft \
            --title "UseJunction Agent v${{ steps.version.outputs.value }}" \
            --notes "Immutable daemon release candidate. Promotion is a separate protected action."
        env:
          GH_TOKEN: ${{ github.token }}
