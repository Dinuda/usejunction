services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: usejunction
      POSTGRES_PASSWORD: usejunction
      POSTGRES_DB: usejunction
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usejunction"]
      interval: 5s
      timeout: 5s
      retries: 5

  litellm-db:
    image: postgres:16
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
      POSTGRES_DB: litellm
    volumes:
      - litellm_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 5s
      timeout: 5s
      retries: 5

  langfuse-db:
    image: postgres:16
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      langfuse-db:
        condition: service_healthy
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: langfuse-dev-secret
      SALT: langfuse-dev-salt
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    platform: linux/amd64
    depends_on:
      litellm-db:
        condition: service_healthy
      langfuse:
        condition: service_started
      admin:
        condition: service_healthy
    env_file:
      - ../.env
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
      - ./litellm/usejunction_callback.py:/app/usejunction_callback.py
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    environment:
      DATABASE_URL: postgresql://litellm:litellm@litellm-db:5432/litellm
      STORE_MODEL_IN_DB: "True"
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-usejunction-master}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: http://langfuse:3000
      USEJUNCTION_INGEST_URL: http://admin:3001/api/ingest/request
      USEJUNCTION_INGEST_SECRET: ${INGEST_SECRET:-change-me-ingest-secret}
      USEJUNCTION_ORG_ID: seed-org

  admin:
    build:
      context: ..
      dockerfile: infra/Dockerfile.admin
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env
    ports:
      - "${ADMIN_HOST_PORT:-3011}:3001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    environment:
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: postgresql://usejunction:usejunction@postgres:5432/usejunction
      INGEST_SECRET: ${INGEST_SECRET:-change-me-ingest-secret}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      NEXTAUTH_URL: http://localhost:${ADMIN_HOST_PORT:-3011}
      NEXT_PUBLIC_LANGFUSE_URL: http://localhost:3000
      LITELLM_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-usejunction-master}
      OPENAI_ADMIN_KEY: ${OPENAI_ADMIN_KEY:-}
      ANTHROPIC_ADMIN_KEY: ${ANTHROPIC_ADMIN_KEY:-}

volumes:
  postgres_data:
  litellm_db_data:
  langfuse_db_data:
