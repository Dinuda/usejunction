services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-usejunction}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\""]
      interval: 5s
      timeout: 5s
      retries: 5

  litellm-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${LITELLM_POSTGRES_USER:?required}
      POSTGRES_PASSWORD: ${LITELLM_POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${LITELLM_POSTGRES_DB:-litellm}
    volumes:
      - litellm_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\""]
      interval: 5s
      timeout: 5s
      retries: 5

  langfuse-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${LANGFUSE_POSTGRES_USER:?required}
      POSTGRES_PASSWORD: ${LANGFUSE_POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${LANGFUSE_POSTGRES_DB:-langfuse}
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\""]
      interval: 5s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: postgresql://${LANGFUSE_POSTGRES_USER:?required}:${LANGFUSE_POSTGRES_PASSWORD:?required}@langfuse-db:5432/${LANGFUSE_POSTGRES_DB:-langfuse}
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:?required}
      SALT: ${LANGFUSE_SALT:?required}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    platform: linux/amd64
    depends_on:
      litellm-db:
        condition: service_healthy
      langfuse:
        condition: service_started
      admin:
        condition: service_healthy
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
      - ./litellm/usejunction_callback.py:/app/usejunction_callback.py
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    environment:
      DATABASE_URL: postgresql://${LITELLM_POSTGRES_USER:?required}:${LITELLM_POSTGRES_PASSWORD:?required}@litellm-db:5432/${LITELLM_POSTGRES_DB:-litellm}
      STORE_MODEL_IN_DB: "True"
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?required}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: http://langfuse:3000
      USEJUNCTION_INGEST_URL: http://admin:3001/api/ingest/request
      USEJUNCTION_INGEST_SECRET: ${INGEST_SECRET:?required}
      USEJUNCTION_ORG_ID: seed-org

  admin:
    build:
      context: ..
      dockerfile: infra/Dockerfile.admin
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${ADMIN_HOST_PORT:-3001}:3001"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    environment:
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: postgresql://${POSTGRES_USER:?required}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-usejunction}
      INGEST_SECRET: ${INGEST_SECRET:?required}
      CRON_SECRET: ${CRON_SECRET:?required}
      AGENT_RELEASE_OPERATIONS_TOKEN: ${AGENT_RELEASE_OPERATIONS_TOKEN:?required}
      INTEGRATION_ENCRYPTION_KEY: ${INTEGRATION_ENCRYPTION_KEY:?required}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
      USEJUNCTION_ALLOW_INSECURE_DEVELOPMENT: "false"
      ADMIN_EMAIL: ${ADMIN_EMAIL:?required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?required}
      AUTH_SECRET: ${AUTH_SECRET:?required}
      NEXTAUTH_URL: http://localhost:${ADMIN_HOST_PORT:-3001}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      INTERNAL_APP_URL: http://127.0.0.1:3001
      NEXT_PUBLIC_LANGFUSE_URL: http://localhost:3000
      LITELLM_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?required}
      DEMO_ENROLLMENT_TOKEN: ${DEMO_ENROLLMENT_TOKEN:?required}
      OPENAI_ADMIN_KEY: ${OPENAI_ADMIN_KEY:-}
      ANTHROPIC_ADMIN_KEY: ${ANTHROPIC_ADMIN_KEY:-}

volumes:
  postgres_data:
  litellm_db_data:
  langfuse_db_data:
