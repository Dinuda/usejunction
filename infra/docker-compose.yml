services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: usejunction
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: usejunction
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usejunction"]
      interval: 5s
      timeout: 5s
      retries: 5

  litellm-db:
    image: postgres:16
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${LITELLM_DB_PASSWORD:?set LITELLM_DB_PASSWORD}
      POSTGRES_DB: litellm
    volumes:
      - litellm_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 5s
      timeout: 5s
      retries: 5

  langfuse-db:
    image: postgres:16
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:?set LANGFUSE_DB_PASSWORD}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      langfuse-db:
        condition: service_healthy
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD:?set LANGFUSE_DB_PASSWORD}@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:?set LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT:?set LANGFUSE_SALT}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    platform: linux/amd64
    depends_on:
      litellm-db:
        condition: service_healthy
      langfuse:
        condition: service_started
      admin:
        condition: service_healthy
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
      - ./litellm/usejunction_callback.py:/app/usejunction_callback.py
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    environment:
      DATABASE_URL: postgresql://litellm:${LITELLM_DB_PASSWORD:?set LITELLM_DB_PASSWORD}@litellm-db:5432/litellm
      STORE_MODEL_IN_DB: "True"
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?set LITELLM_MASTER_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: http://langfuse:3000
      USEJUNCTION_INGEST_URL: http://admin:3001/api/ingest/request
      USEJUNCTION_INGEST_SECRET: ${INGEST_SECRET:?set INGEST_SECRET}

  admin:
    build:
      context: ..
      dockerfile: infra/Dockerfile.admin
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env
    ports:
      - "${ADMIN_HOST_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    environment:
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: postgresql://usejunction:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/usejunction
      INGEST_SECRET: ${INGEST_SECRET:?set INGEST_SECRET}
      INGEST_ORG_ID: ${INGEST_ORG_ID:?set INGEST_ORG_ID}
      CRON_SECRET: ${CRON_SECRET:?set CRON_SECRET}
      INTEGRATION_ENCRYPTION_KEY: ${INTEGRATION_ENCRYPTION_KEY:?set INTEGRATION_ENCRYPTION_KEY}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
      USEJUNCTION_ALLOW_INSECURE_DEVELOPMENT: "false"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET}
      NEXTAUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET}
      NEXTAUTH_URL: http://localhost:${ADMIN_HOST_PORT:-3001}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-false}
      INTERNAL_APP_URL: http://127.0.0.1:3001
      NEXT_PUBLIC_LANGFUSE_URL: http://localhost:3000
      LITELLM_URL: http://litellm:4000
      NEXT_PUBLIC_LITELLM_URL: ${NEXT_PUBLIC_LITELLM_URL:-http://localhost:4000}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?set LITELLM_MASTER_KEY}
      DEMO_ENROLLMENT_TOKEN: ${DEMO_ENROLLMENT_TOKEN:-}
      OPENAI_ADMIN_KEY: ${OPENAI_ADMIN_KEY:-}
      ANTHROPIC_ADMIN_KEY: ${ANTHROPIC_ADMIN_KEY:-}

volumes:
  postgres_data:
  litellm_db_data:
  langfuse_db_data:
